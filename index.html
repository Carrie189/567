<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>互动实验：认识导体与绝缘体</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://data.aix101.com/cdn/npm/@tailwindcss/3.4.17.js"></script>
    <!-- 引入 Font Awesome 图标 -->
    <link rel="stylesheet" href="https://data.aix101.com/cdn/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        eduBlue: '#4285F4',
                        eduGreen: '#34A853',
                        eduYellow: '#FBBC05',
                        eduRed: '#EA4335',
                        eduBg: '#F5F7FB'
                    },
                    boxShadow: {
                        'card': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F5F7FB; 
            overflow: hidden; 
            touch-action: none;
            user-select: none;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .light-on {
            filter: drop-shadow(0 0 20px rgba(251,188,5,0.8)) drop-shadow(0 0 40px rgba(251,188,5,0.8));
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { filter: drop-shadow(0 0 15px rgba(251,188,5,0.6)); }
            to { filter: drop-shadow(0 0 35px rgba(251,188,5,1)); }
        }

        .wire {
            position: absolute;
            background-color: #D1D5DB;
            border-radius: 9999px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
            z-index: 10;
        }
        
        .circuit-active .wire {
            background-color: #9CA3AF;
        }
        
        .circuit-active .wire::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(90deg, transparent, #FBBC05 50%, transparent);
            background-size: 200% 100%;
            opacity: 0.8;
        }
        
        .circuit-active .wire-v::after {
            background-image: linear-gradient(180deg, transparent, #FBBC05 50%, transparent);
            background-size: 100% 200%;
        }

        @keyframes flow-right { from { background-position: 200% 0; } to { background-position: -200% 0; } }
        @keyframes flow-left { from { background-position: -200% 0; } to { background-position: 200% 0; } }
        @keyframes flow-down { from { background-position: 0 200%; } to { background-position: 0 -200%; } }
        @keyframes flow-up { from { background-position: 0 -200%; } to { background-position: 0 200%; } }

        .circuit-active .dir-right::after { animation: flow-right 1s linear infinite; }
        .circuit-active .dir-left::after { animation: flow-left 1s linear infinite; }
        .circuit-active .dir-down::after { animation: flow-down 1s linear infinite; }
        .circuit-active .dir-up::after { animation: flow-up 1s linear infinite; }

        .dragging-source {
            opacity: 0.4;
            transform: scale(0.95);
        }

        .drop-zone-highlight {
            border-color: #4285F4 !important;
            background-color: #E8F0FE !important;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(66, 133, 244, 0.3);
        }

        img { user-select: none; -webkit-user-drag: none; }
        
        .material-item {
            position: relative;
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .conclusion-bar {
            transition: all 0.2s ease;
        }
        
        .touch-drag-clone {
            position: fixed;
            z-index: 9999;
            opacity: 0.8;
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            pointer-events: none;
            transform: scale(1.1);
            transition: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .touch-drag-clone img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col p-3 md:p-5 text-gray-800">

    <header class="bg-white rounded-2xl shadow-sm p-4 mb-4 flex items-center justify-between border-b-4 border-eduBlue">
        <div class="flex items-center gap-4">
            <div class="bg-blue-50 text-eduBlue p-3 rounded-xl">
                <i class="fa-solid fa-bolt text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-wide">认识导体与绝缘体</h1>
                <p class="text-gray-500 text-sm mt-1">点击材料或拖拽至缺口，观察电流</p>
            </div>
        </div>
        <button onclick="resetExperiment()" class="px-4 py-2 bg-gray-50 hover:bg-gray-100 text-gray-700 rounded-xl font-bold transition-colors flex items-center gap-2 border border-gray-200 shadow-sm active:scale-95 text-sm">
            <i class="fa-solid fa-rotate-right text-eduBlue"></i> 重置实验
        </button>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row gap-5 h-full min-h-0">
        
        <div class="w-full lg:w-1/3 xl:w-1/4 bg-white rounded-2xl shadow-card p-4 flex flex-col h-full border border-gray-100">
            <div class="flex items-center justify-between mb-3 pb-2 border-b border-gray-100">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-box-open text-eduYellow text-xl"></i>
                    <h2 class="text-lg font-bold text-gray-700">实验材料箱</h2>
                </div>
                <button onclick="resetMaterialsToDefault()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded-full transition flex items-center gap-1" title="重置所有材料为默认">
                    <i class="fa-solid fa-arrows-rotate text-xs"></i> 重置材料
                </button>
            </div>
            <div id="material-list" class="grid grid-cols-2 gap-3 overflow-y-auto pb-2 pr-1 flex-1 content-start"></div>
        </div>

        <div class="w-full lg:flex-1 flex flex-col gap-5 h-full">
            
            <div id="status-board" class="bg-white rounded-2xl shadow-card p-4 border-l-8 border-gray-300 transition-all duration-300 flex items-center gap-4 min-h-[90px]">
                <div id="status-icon" class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 text-2xl transition-colors shrink-0">
                    <i class="fa-solid fa-circle-question"></i>
                </div>
                <div class="flex-1">
                    <h3 id="status-title" class="text-xl font-bold text-gray-700">等待放入材料</h3>
                    <p id="status-desc" class="text-gray-500 mt-1 text-sm">电路目前是断开的，灯泡不会发光。</p>
                </div>
            </div>

            <div id="circuit-board" class="flex-1 bg-white rounded-2xl shadow-card relative flex flex-col items-center justify-center p-6 overflow-hidden border border-gray-100">
                <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#000 2px, transparent 2px); background-size: 30px 30px;"></div>
                
                <div class="relative w-full max-w-3xl h-[24rem] flex items-center justify-center mt-4">
                    
                    <div class="absolute left-6 md:left-16 z-20 flex flex-col items-center top-8">
                        <span class="text-sm font-bold text-gray-500 mb-1 bg-white px-2 py-1 rounded-md shadow-sm">电池</span>
                        <div class="w-16 h-28 bg-white rounded-xl shadow-md border-2 border-gray-200 p-1 flex flex-col items-center justify-center relative">
                            <div class="absolute -top-4 text-red-500 font-bold text-2xl">+</div>
                            <img src="https://api.zcat.cn/udata/711842/png/6dc75536284230245368a6c06b54c796.png" class="w-full h-full object-contain pointer-events-none" alt="电池">
                            <div class="absolute -bottom-5 text-blue-500 font-bold text-2xl">-</div>
                        </div>
                        <div class="absolute -right-2 top-12 w-4 h-2 bg-gray-700"></div>
                        <div class="absolute -right-2 bottom-12 w-4 h-2 bg-gray-700"></div>
                    </div>

                    <div class="wire dir-right h-2" style="left: 6.5rem; top: 3.8rem; right: 58%;"></div>

                    <div class="absolute left-1/2 top-16 -translate-x-1/2 z-30">
                        <div id="drop-zone" class="w-32 h-32 md:w-36 md:h-36 rounded-2xl border-4 border-dashed border-gray-300 bg-gray-50 flex flex-col items-center justify-center transition-all duration-200 cursor-pointer shadow-inner relative group">
                            <i id="drop-icon" class="fa-solid fa-arrow-down text-3xl text-gray-300 mb-2 group-hover:text-eduBlue transition-colors pointer-events-none"></i>
                            <span id="drop-text" class="text-sm font-bold text-gray-400 text-center px-2 group-hover:text-eduBlue transition-colors pointer-events-none">放入此缺口</span>
                        </div>
                    </div>

                    <div class="wire dir-right h-2" style="left: 58%; top: 3.8rem; right: 6.5rem;"></div>

                    <div class="absolute right-6 md:right-16 z-20 flex flex-col items-center top-8">
                        <span class="text-sm font-bold text-gray-500 mb-1 bg-white px-2 py-1 rounded-md shadow-sm">小灯泡</span>
                        <div class="w-20 h-28 bg-white rounded-xl shadow-md border-2 border-gray-200 p-1 flex items-center justify-center relative">
                            <img id="bulb-img" src="https://api.zcat.cn/udata/711842/png/1a56d727b6868e71815baf31164036a0.png" class="w-[110%] h-[110%] object-contain pointer-events-none transition-all duration-300" alt="灯泡">
                        </div>
                        <div class="absolute -left-2 top-12 w-4 h-2 bg-gray-700"></div>
                        <div class="absolute -left-2 bottom-12 w-4 h-2 bg-gray-700"></div>
                    </div>

                    <div class="wire wire-v dir-down w-2" style="right: 5rem; top: 10rem; height: 8rem;"></div>
                    <div class="wire dir-left h-2" style="left: 5.5rem; right: 5rem; top: 18rem;"></div>
                    <div class="wire wire-v dir-up w-2" style="left: 5.5rem; top: 10rem; height: 8rem;"></div>
                </div>
                
                <!-- 底部结论条 -->
                <div id="conclusion-bar" class="conclusion-bar mt-auto w-full flex justify-center z-10 pt-2 hidden">
                    <div class="bg-blue-50 border border-blue-100 text-eduBlue px-5 py-3 rounded-2xl font-bold text-sm md:text-base shadow-sm flex items-center gap-3 max-w-full">
                        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-eduYellow shadow-sm shrink-0">
                            <i class="fa-solid fa-lightbulb"></i>
                        </div>
                        <span class="leading-tight text-gray-800 text-center md:text-left">
                            小灯泡亮，则物体<span class="text-eduGreen font-bold mx-0.5">容易让电流通过，易导电。</span><br class="hidden sm:inline">小灯泡不亮，则物体<span class="text-eduRed font-bold mx-0.5">不容易让电流通过，不易导电。</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ---------- 材料数据（请在这里修改图片路径）----------
        // 说明：img 字段可以是网络图片URL，也可以是 images/ 文件夹下的相对路径。
        // 例如：'images/huixingzhen.png'，请确保 images 文件夹中存在对应图片。
        // 默认使用网络图片（方便初次测试），您可以根据需要替换成自己的图片路径。
        function getDefaultMaterials() {
            return [
                { id: 'm1', name: '回形针', type: 'conductor', img: 'https://api.zcat.cn/udata/711842/png/ba4d9cc0ee5f5fa31ba1640a15847397.png' },
                { id: 'm2', name: '塑料尺', type: 'insulator', img: 'https://api.zcat.cn/udata/711842/png/c0728b027cd7088e3a26e91a70eec981.png' },
                { id: 'm3', name: '铁钉', type: 'conductor', img: 'https://api.zcat.cn/udata/711842/png/0fa39b4482f6feaae02bf4cc89da6bff.png' },
                { id: 'm4', name: '铜钥匙', type: 'conductor', img: 'images/tongyaozhi.png' }, // 临时占位，请替换
                { id: 'm5', name: '气球', type: 'insulator', img: 'https://api.zcat.cn/udata/711842/png/4c138a7cb8e735c86d5875990f1877d0.png' },
                { id: 'm6', name: '树枝', type: 'insulator', img: 'images/mutiao.png' }, // 临时占位，请替换
                { id: 'm7', name: '玻璃片', type: 'insulator', img: 'https://api.zcat.cn/udata/711842/png/4225ce025b9016f4f8b20ab6a3a07cfc.png' },
                { id: 'm8', name: '橡皮', type: 'insulator', img: 'https://api.zcat.cn/udata/711842/png/b0e6ee3dfc774d02755c96b92cd7b727.png' },
                { id: 'm9', name: '铝箔纸', type: 'conductor', img: 'images/xibozhi.png' }, // 临时占位，请替换
                { id: 'm10', name: '泡沫块', type: 'insulator', img: 'images/paomo.png' } // 临时占位，请替换
            ];
        }
        
        let materialsData = [];
        let currentTestedItem = null; 
        
        function resetMaterialsToDefault() {
            materialsData = getDefaultMaterials();
            renderMaterialList();
            if (currentTestedItem) removeTestedItem();
        }
        
        // 渲染材料列表（无图片替换按钮）
        function renderMaterialList() {
            const container = document.getElementById('material-list');
            container.innerHTML = '';
            materialsData.forEach((item) => {
                const el = document.createElement('div');
                el.draggable = true;
                el.className = 'material-item bg-white border-2 border-gray-100 rounded-xl p-2 flex flex-col items-center gap-1 cursor-grab hover:border-eduBlue hover:shadow-md transition-all touch-none select-none';
                el.dataset.id = item.id;
                el.dataset.type = item.type;
                el.dataset.name = item.name;
                el.innerHTML = `
                    <div class="w-14 h-14 md:w-16 md:h-16 bg-gray-50/50 rounded-lg flex items-center justify-center overflow-hidden pointer-events-none">
                        <img src="${item.img}" draggable="false" class="w-full h-full object-contain p-1" style="mix-blend-mode: multiply;">
                    </div>
                    <span class="material-name font-bold text-gray-600 text-sm pointer-events-none">${escapeHtml(item.name)}</span>
                `;
                
                // 点击卡片直接放入实验
                el.addEventListener('click', () => {
                    testMaterial({ id: item.id, type: item.type, name: item.name });
                });
                
                // 鼠标拖拽
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);
                // 触屏拖拽
                el.addEventListener('touchstart', handleTouchStart, { passive: false });
                el.addEventListener('touchmove', handleTouchMove, { passive: false });
                el.addEventListener('touchend', handleTouchEnd);
                
                container.appendChild(el);
            });
        }
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m==='&') return '&amp;'; if (m==='<') return '&lt;'; if (m==='>') return '&gt;'; return m; }); }
        
        // 鼠标拖拽
        function handleDragStart(e) {
            const el = e.currentTarget;
            if (el.classList.contains('opacity-40')) { e.preventDefault(); return; }
            e.dataTransfer.setData('text/plain', JSON.stringify({ id: el.dataset.id, type: el.dataset.type, name: el.dataset.name }));
            e.dataTransfer.effectAllowed = 'copy';
            setTimeout(() => el.classList.add('dragging-source'), 0);
        }
        function handleDragEnd(e) { e.currentTarget.classList.remove('dragging-source'); }
        
        // 触屏拖拽
        let touchDragElement = null;
        let touchClone = null;
        let touchStartX = 0, touchStartY = 0;
        
        function handleTouchStart(e) {
            e.preventDefault();
            const el = e.currentTarget;
            if (el.classList.contains('opacity-40')) return;
            touchDragElement = el;
            const rect = el.getBoundingClientRect();
            const touch = e.touches[0];
            touchStartX = touch.clientX - rect.left;
            touchStartY = touch.clientY - rect.top;
            touchClone = document.createElement('div');
            touchClone.className = 'touch-drag-clone';
            const imgSrc = el.querySelector('img').src;
            touchClone.innerHTML = `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:contain;">`;
            document.body.appendChild(touchClone);
            touchClone.style.left = (touch.clientX - touchStartX) + 'px';
            touchClone.style.top = (touch.clientY - touchStartY) + 'px';
            el.classList.add('dragging-source');
        }
        
        function handleTouchMove(e) {
            if (!touchClone) return;
            e.preventDefault();
            const touch = e.touches[0];
            touchClone.style.left = (touch.clientX - touchStartX) + 'px';
            touchClone.style.top = (touch.clientY - touchStartY) + 'px';
            const dropZone = document.getElementById('drop-zone');
            const dropRect = dropZone.getBoundingClientRect();
            if (touch.clientX >= dropRect.left && touch.clientX <= dropRect.right && touch.clientY >= dropRect.top && touch.clientY <= dropRect.bottom) {
                dropZone.classList.add('drop-zone-highlight');
            } else {
                dropZone.classList.remove('drop-zone-highlight');
            }
        }
        
        function handleTouchEnd(e) {
            if (!touchClone) return;
            e.preventDefault();
            const dropZone = document.getElementById('drop-zone');
            const dropRect = dropZone.getBoundingClientRect();
            const lastTouch = e.changedTouches[0];
            let dropped = false;
            if (lastTouch && lastTouch.clientX >= dropRect.left && lastTouch.clientX <= dropRect.right && lastTouch.clientY >= dropRect.top && lastTouch.clientY <= dropRect.bottom) {
                dropped = true;
            }
            if (dropped && touchDragElement) {
                const data = { id: touchDragElement.dataset.id, type: touchDragElement.dataset.type, name: touchDragElement.dataset.name };
                testMaterial(data);
            }
            if (touchClone) touchClone.remove();
            if (touchDragElement) touchDragElement.classList.remove('dragging-source');
            dropZone.classList.remove('drop-zone-highlight');
            touchClone = null;
            touchDragElement = null;
        }
        
        // 通用实验逻辑
        function testMaterial(data) {
            const freshMaterial = materialsData.find(m => m.id === data.id);
            if (!freshMaterial) return;
            if (currentTestedItem) {
                const oldEl = document.querySelector(`.material-item[data-id="${currentTestedItem.id}"]`);
                if (oldEl) oldEl.classList.remove('opacity-40', 'pointer-events-none', 'scale-95', 'bg-gray-100');
            }
            currentTestedItem = { id: freshMaterial.id, type: freshMaterial.type, name: freshMaterial.name };
            const currentEl = document.querySelector(`.material-item[data-id="${freshMaterial.id}"]`);
            if (currentEl) currentEl.classList.add('opacity-40', 'pointer-events-none', 'scale-95', 'bg-gray-100');
            const dropZone = document.getElementById('drop-zone');
            dropZone.innerHTML = `
                <img src="${freshMaterial.img}" draggable="false" class="w-16 h-16 md:w-20 md:h-20 object-contain mb-2 pointer-events-none" style="mix-blend-mode: multiply;">
                <span class="text-sm font-bold text-gray-800 bg-white border border-gray-100 px-3 py-1 rounded-full shadow-sm pointer-events-none">${escapeHtml(freshMaterial.name)}</span>
                <div class="absolute -top-3 -right-3 w-8 h-8 bg-white border border-gray-200 text-gray-500 rounded-full flex items-center justify-center shadow-md hover:bg-red-50 hover:text-red-500 transition-colors cursor-pointer z-10" onclick="removeTestedItem(event)">
                    <i class="fa-solid fa-xmark"></i>
                </div>
                <div class="absolute top-1/2 -left-2 w-4 h-4 bg-gray-400 rounded-full -mt-2 shadow-inner"></div>
                <div class="absolute top-1/2 -right-2 w-4 h-4 bg-gray-400 rounded-full -mt-2 shadow-inner"></div>
            `;
            dropZone.className = 'w-32 h-32 md:w-36 md:h-36 rounded-2xl border-4 border-solid border-gray-400 bg-white shadow-md flex flex-col items-center justify-center transition-all duration-200 cursor-pointer relative';
            evaluateCircuit(freshMaterial);
            showConclusion();
        }
        
        function evaluateCircuit(item) {
            const statusBoard = document.getElementById('status-board');
            const statusIcon = document.getElementById('status-icon');
            const statusTitle = document.getElementById('status-title');
            const statusDesc = document.getElementById('status-desc');
            const bulbImg = document.getElementById('bulb-img');
            const circuitBoard = document.getElementById('circuit-board');
            if (item.type === 'conductor') {
                statusBoard.className = 'bg-white rounded-2xl shadow-card p-4 border-l-8 border-eduGreen transition-all duration-300 flex items-center gap-4 min-h-[90px]';
                statusIcon.className = 'w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-eduGreen text-2xl transition-colors shrink-0';
                statusIcon.innerHTML = '<i class="fa-solid fa-check"></i>';
                statusTitle.innerText = '实验成功！灯泡亮了！';
                statusTitle.className = 'text-xl font-bold text-eduGreen';
                statusDesc.innerHTML = '';
                bulbImg.src = 'https://api.zcat.cn/udata/711842/png/8faefb3323505115f870dd221f47b89f.png';
                bulbImg.classList.add('light-on');
                circuitBoard.classList.add('circuit-active');
            } else {
                statusBoard.className = 'bg-white rounded-2xl shadow-card p-4 border-l-8 border-eduRed transition-all duration-300 flex items-center gap-4 min-h-[90px]';
                statusIcon.className = 'w-12 h-12 rounded-full bg-red-100 flex items-center justify-center text-eduRed text-2xl transition-colors shrink-0';
                statusIcon.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                statusTitle.innerText = '电路断开！灯泡没亮。';
                statusTitle.className = 'text-xl font-bold text-eduRed';
                statusDesc.innerHTML = '';
                bulbImg.src = 'https://api.zcat.cn/udata/711842/png/1a56d727b6868e71815baf31164036a0.png';
                bulbImg.classList.remove('light-on');
                circuitBoard.classList.remove('circuit-active');
            }
        }
        
        window.removeTestedItem = function(e) {
            if (e) e.stopPropagation(); 
            if (!currentTestedItem) return;
            const oldEl = document.querySelector(`.material-item[data-id="${currentTestedItem.id}"]`);
            if (oldEl) oldEl.classList.remove('opacity-40', 'pointer-events-none', 'scale-95', 'bg-gray-100');
            currentTestedItem = null;
            const dropZone = document.getElementById('drop-zone');
            dropZone.innerHTML = `
                <i id="drop-icon" class="fa-solid fa-arrow-down text-3xl text-gray-300 mb-2 group-hover:text-eduBlue transition-colors pointer-events-none"></i>
                <span id="drop-text" class="text-sm font-bold text-gray-400 text-center px-2 group-hover:text-eduBlue transition-colors pointer-events-none">放入此缺口</span>
            `;
            dropZone.className = 'w-32 h-32 md:w-36 md:h-36 rounded-2xl border-4 border-dashed border-gray-300 bg-gray-50 flex flex-col items-center justify-center transition-all duration-200 cursor-pointer shadow-inner relative group';
            resetUIState();
            hideConclusion();
        };
        
        function resetUIState() {
            const statusBoard = document.getElementById('status-board');
            const statusIcon = document.getElementById('status-icon');
            const statusTitle = document.getElementById('status-title');
            const statusDesc = document.getElementById('status-desc');
            const bulbImg = document.getElementById('bulb-img');
            const circuitBoard = document.getElementById('circuit-board');
            statusBoard.className = 'bg-white rounded-2xl shadow-card p-4 border-l-8 border-gray-300 transition-all duration-300 flex items-center gap-4 min-h-[90px]';
            statusIcon.className = 'w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 text-2xl transition-colors shrink-0';
            statusIcon.innerHTML = '<i class="fa-solid fa-circle-question"></i>';
            statusTitle.innerText = '等待放入材料';
            statusTitle.className = 'text-xl font-bold text-gray-700';
            statusDesc.innerText = '电路目前是断开的，灯泡不会发光。';
            bulbImg.src = 'https://api.zcat.cn/udata/711842/png/1a56d727b6868e71815baf31164036a0.png';
            bulbImg.classList.remove('light-on');
            circuitBoard.classList.remove('circuit-active');
        }
        
        function showConclusion() { document.getElementById('conclusion-bar').classList.remove('hidden'); }
        function hideConclusion() { document.getElementById('conclusion-bar').classList.add('hidden'); }
        window.resetExperiment = function() { removeTestedItem(); };
        window.resetMaterialsToDefault = resetMaterialsToDefault;
        
        // 鼠标拖拽需要监听缺口
        function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; document.getElementById('drop-zone').classList.add('drop-zone-highlight'); }
        function handleDragLeave(e) { document.getElementById('drop-zone').classList.remove('drop-zone-highlight'); }
        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('drop-zone-highlight');
            const dataStr = e.dataTransfer.getData('text/plain');
            if (!dataStr) return;
            const data = JSON.parse(dataStr);
            testMaterial(data);
        }
        
        function init() {
            materialsData = getDefaultMaterials();
            renderMaterialList();
            hideConclusion();
            const dropZone = document.getElementById('drop-zone');
            dropZone.addEventListener('dragover', handleDragOver);
            dropZone.addEventListener('dragleave', handleDragLeave);
            dropZone.addEventListener('drop', handleDrop);
            dropZone.addEventListener('click', (e) => { if (e.target.closest('.absolute') && currentTestedItem) removeTestedItem(e); });
        }
        window.onload = init;
    </script>
</body>
</html>
